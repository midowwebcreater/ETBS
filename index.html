<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETBS Skincare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#fff;
color:#333;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:white;
box-shadow:0 3px 15px rgba(0,0,0,0.05);
}

.logo{
font-size:26px;
font-weight:600;
color:#ff3d86;
}

.cart-btn{
background:#ff3d86;
color:white;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:42px;
color:#ff3d86;
margin-bottom:10px;
}

.hero p{
margin-bottom:20px;
}

/* PRODUCTS */

.section{
padding:60px 8%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.product button{
background:#ff3d86;
border:none;
padding:10px 20px;
color:white;
border-radius:20px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.checkout{
background:#ff3d86;
color:white;
padding:12px;
border:none;
width:100%;
margin-top:20px;
border-radius:25px;
cursor:pointer;
}

footer{
text-align:center;
padding:25px;
background:#111;
color:white;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<div class="logo">ETBS</div>

<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

</header>


<section class="hero">

<h1>Glow Naturally With ETBS</h1>

<p>Premium skincare products designed for healthy glowing skin.</p>

</section>


<section class="section">

<h2 style="text-align:center;margin-bottom:40px;color:#ff3d86">
Best Selling Products
</h2>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Night Fairness Cream</h3>
<p>₹799</p>
<button onclick="addToCart('Night Cream',799)">
Add To Cart
</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Acne Repair Cream</h3>
<p>₹699</p>
<button onclick="addToCart('Acne Cream',699)">
Add To Cart
</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Glow Face Serum</h3>
<p>₹899</p>
<button onclick="addToCart('Face Serum',899)">
Add To Cart
</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Brightening Cleanser</h3>
<p>₹499</p>
<button onclick="addToCart('Cleanser',499)">
Add To Cart
</button>
</div>

</div>

</section>


<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">
Checkout
</button>

</div>


<footer>

<p>© 2026 ETBS Skincare</p>

</footer>


<script>

let cart=[]
let total=0

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function addToCart(name,price){

cart.push({name,price})

total+=price

updateCart()

}

function updateCart(){

let items=document.getElementById("cart-items")

items.innerHTML=""

cart.forEach(item=>{

items.innerHTML+=`

<div class="cart-item">

<span>${item.name}</span>

<span>₹${item.price}</span>

</div>

`

})

document.getElementById("total").innerText=total

document.getElementById("count").innerText=cart.length

}

function checkout(){

alert("Order placed! We will contact you soon.")

cart=[]
total=0

updateCart()

}

</script>


</body>
</html>
